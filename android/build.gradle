buildscript {
    ext.kotlin_version = '2.1.0' // ✅ Updated Kotlin version
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2' // ✅ Updated Gradle version
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0' // ✅ Updated Kotlin plugin
        classpath 'com.google.gms:google-services:4.4.2' // ✅ Fixed dependency
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
